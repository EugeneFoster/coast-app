<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · COAST</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f1e9;
        color: #17181b;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      .card {
        max-width: 22rem;
        padding: 2rem;
        text-align: center;
      }
      .brand {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #6c6e73;
      }
      h1 {
        font-size: 1.4rem;
        margin: 0.75rem 0 0.5rem;
      }
      p {
        color: #6c6e73;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      button {
        margin-top: 1.25rem;
        border: 1px solid #dbd7cb;
        background: transparent;
        color: inherit;
        border-radius: 6px;
        padding: 0.6rem 1.1rem;
        font-size: 0.9rem;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #15161a;
          color: #f0ede5;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="brand">COAST · metal works</p>
      <h1>You're offline</h1>
      <p>
        This page isn't available without a connection. Drawing sheets you've
        already opened stay viewable. Reconnect to load the rest.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
